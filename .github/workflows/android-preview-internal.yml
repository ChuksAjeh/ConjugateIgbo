name: Android Preview Play Internal Testing

on:
  push:
    branches: [ main, develop ]
    paths: [ 'mobile/**' ]

jobs:
  build-and-submit-android:
    runs-on: ubuntu-latest

    concurrency:
      group: android-preview-internal
      cancel-in-progress: true

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: mobile/package-lock.json

      - name: Install dependencies
        run: npm ci
        working-directory: mobile

      - name: Install EAS CLI
        run: npm install -g eas-cli

      - name: Authenticate with Expo
        run: eas whoami
        env:
          EXPO_TOKEN: ${{ secrets.EXPO_TOKEN }}

      - name: Build Android (Preview)
        working-directory: mobile
        id: build
        run: |
          BUILD_JSON=$(eas build \
            --platform android \
            --profile preview \
            --non-interactive \
            --no-wait \
            --json)

          echo "$BUILD_JSON"

          BUILD_ID=$(echo "$BUILD_JSON" | jq -r '.[0].id')
          echo "build_id=$BUILD_ID" >> $GITHUB_OUTPUT
        env:
          EXPO_TOKEN: ${{ secrets.EXPO_TOKEN }}

      - name: Submit to Play Internal Testing
        working-directory: mobile
        run: |
          eas submit \
            --platform android \
            --id ${{ steps.build.outputs.build_id }} \
            --non-interactive \
            --no-wait
        env:
          EXPO_TOKEN: ${{ secrets.EXPO_TOKEN }}
