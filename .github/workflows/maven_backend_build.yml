name: Maven CI/CD Backend Build Pipeline

on:
  push:
    branches: [ main, develop ]
    paths: [ 'backend/**' ]
  pull_request:
    branches: [ main ]
    paths: [ 'backend/**' ]

jobs:
  build:
    name: Backend build & test
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'
          cache: maven

      # Docker is required for Testcontainers (enabled by default on GitHub runners)

      - name: Build & test (backend only)
        working-directory: backend
        run: mvn -B -DskipITs=false clean verify
